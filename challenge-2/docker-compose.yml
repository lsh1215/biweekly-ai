services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ria-postgres
    environment:
      POSTGRES_DB: ria
      POSTGRES_USER: ria
      POSTGRES_PASSWORD: ria
    ports:
      - "5432:5432"
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ria -d ria"]
      interval: 2s
      timeout: 3s
      retries: 30
    restart: unless-stopped
