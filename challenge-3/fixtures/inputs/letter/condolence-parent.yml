format: letter
slug: condolence-parent
topic: "위로 편지 (지인 부친상)"
recipient: "회사 동료 민준 님 (1년 같이 일함, 친한 사이는 아니지만 진심 전하고 싶음)"
core_message: "장례 직후의 위로 카드 - 위로의 상투어를 피하고, 감정의 무게를 인정하면서 할 수 있는 작은 도움 하나를 구체적으로 제안한다. 우리 사이의 구체적 한 장면(작년 가을 마감 야근 때 라면을 끓여 와 같이 먹었던 밤)을 짧게 호명하여, 추상이 아닌 실제 관계로부터 위로가 나오도록 한다."
skeleton:
  opening: "민준 님, 부친상 소식을 들었습니다 - 짧고 단정한 호명. 이름을 부르는 한 줄."
  body1: "공백을 메우는 말은 없다는 인정 - 위로의 말 자체의 한계를 솔직히 적음. '괜찮으실 거예요' 같은 상투어를 의도적으로 피한다."
  body2: "특정 장면 호명 - 작년 가을 출시 마감 야근 때 민준 님이 컵라면을 끓여와 둘이 회의실에서 먹었던 밤. 그 한 장면을 1-2문장으로 짧게 떠올린다(추모가 아니라 우리 관계의 닻)."
  body3: "복귀 후 도움의 구체적 제안 - 업무 인수인계 정리, 회의 대행, 점심 한 끼 동행 중 무엇이든 가능. 부담 없이 한 단어로만 알려 달라고 적는다."
  closing: "당분간은 건강 먼저 챙기시기를. 이름을 한 번 더 부르며 닫는다."
tone: "~습니다"
publish_target: personal
known_facts_required:
  - "1년"
  - "민준"
  - "작년 가을"
